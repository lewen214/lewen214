<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#062035"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="40" x2="760" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#facc15"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" rx="22" fill="url(#bg)"/>
  <path d="M60 220 C165 170, 220 170, 295 120 C345 88, 395 66, 460 88 C535 114, 565 180, 640 150 C715 120, 755 78, 840 92" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="150" cy="178" r="10" fill="#facc15"/>
  <circle cx="295" cy="120" r="10" fill="#22d3ee"/>
  <circle cx="460" cy="88" r="10" fill="#f97316"/>
  <circle cx="640" cy="150" r="10" fill="#22d3ee"/>
  <circle cx="840" cy="92" r="10" fill="#facc15"/>

  <text x="58" y="58" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Optical Signal Map</text>
  <text x="58" y="92" fill="#22d3ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Waveguide · PVG · RCWA · Ray Tracing</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    <rect x="58" y="132" width="178" height="46" rx="14" fill="#0b1224" stroke="#22d3ee"/>
    <text x="88" y="161" fill="#22d3ee" font-size="20">AR Optics</text>

    <rect x="250" y="132" width="144" height="46" rx="14" fill="#0b1224" stroke="#facc15"/>
    <text x="283" y="161" fill="#facc15" font-size="20">PVG</text>

    <rect x="408" y="132" width="164" height="46" rx="14" fill="#0b1224" stroke="#fb7185"/>
    <text x="438" y="161" fill="#fb7185" font-size="20">RCWA</text>

    <rect x="586" y="132" width="180" height="46" rx="14" fill="#0b1224" stroke="#38bdf8"/>
    <text x="612" y="161" fill="#38bdf8" font-size="20">Ray Tracing</text>
  </g>

  <text x="58" y="232" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Tracking photons, wavefronts, coupling efficiency, and display uniformity.</text>
</svg>
