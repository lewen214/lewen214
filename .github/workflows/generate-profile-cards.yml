name: generate profile cards

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate profile cards
        run: node scripts/generate-profile-cards.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: lewen214

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated profile cards"
          file_pattern: "assets/*.svg"
