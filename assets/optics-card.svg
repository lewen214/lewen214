<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="240" viewBox="0 0 1080 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0b2740"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="beam" x1="130" y1="170" x2="860" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.45" stop-color="#facc15"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="240" rx="18" fill="url(#bg)"/>
  <text x="42" y="54" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Optical Signal Map</text>
  <text x="42" y="78" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Waveguide · PVG · RCWA · Ray Tracing</text>

  <path d="M54 170 C120 150, 160 120, 210 124 C262 128, 280 92, 322 96 C372 100, 386 142, 438 136 C486 130, 506 92, 560 94 C623 96, 652 140, 706 134 C764 128, 804 84, 864 86" stroke="url(#beam)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="210" cy="124" r="6" fill="#22d3ee"/>
  <circle cx="322" cy="96" r="6" fill="#facc15"/>
  <circle cx="438" cy="136" r="6" fill="#fb7185"/>
  <circle cx="560" cy="94" r="6" fill="#22d3ee"/>
  <circle cx="706" cy="134" r="6" fill="#facc15"/>
  <circle cx="864" cy="86" r="6" fill="#fb7185"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    <rect x="44" y="110" width="152" height="34" rx="11" fill="#0b1224" stroke="#22d3ee"/>
    <text x="78" y="132" fill="#22d3ee" font-size="15">AR Optics</text>

    <rect x="210" y="110" width="112" height="34" rx="11" fill="#0b1224" stroke="#facc15"/>
    <text x="242" y="132" fill="#facc15" font-size="15">PVG</text>

    <rect x="336" y="110" width="124" height="34" rx="11" fill="#0b1224" stroke="#fb7185"/>
    <text x="367" y="132" fill="#fb7185" font-size="15">RCWA</text>

    <rect x="474" y="110" width="154" height="34" rx="11" fill="#0b1224" stroke="#38bdf8"/>
    <text x="498" y="132" fill="#38bdf8" font-size="15">Ray Tracing</text>
  </g>

  <text x="42" y="204" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Coupling, propagation, out-coupling, eyebox optimization, and display uniformity.</text>
</svg>
